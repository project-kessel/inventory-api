# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# See https://docs.coderabbit.ai/reference/configuration for all fields and default values

# Security path_instructions adapted from RedHatProductSecurity/prodsec-skills
language: "en-US"

reviews:
  profile: "chill"
  request_changes_workflow: true
  high_level_summary: true
  high_level_summary_placement: "comment"
  collapse_walkthrough: false
  sequence_diagrams: true
  poem: false

  path_filters:
    - "!vendor/**"
    - "!api/kessel/**/*.go"

  auto_review:
    enabled: true
    auto_incremental_review: true
    drafts: false
    base_branches:
      - "main"
      - "release/.*"

  path_instructions:

    # ── Go security ──────────────────────────────────────────────
    - path: "**/*.go"
      instructions: |
        Go security (prodsec-skills):
        - Never ignore error returns
        - database/sql with placeholders; no fmt.Sprintf in queries
        - Use stdlib crypto/* and golang.org/x/crypto;
          avoid third-party crypto libraries
        - Integer overflow: bounds-check user-supplied sizes
        - context.Context for cancellation and timeouts
        - No string concatenation for SQL; use parameterized queries
        - Validate and sanitize gRPC input at service boundaries

    # ── Injection & input validation ─────────────────────────────
    - path: "internal/service/**/*.go"
      instructions: |
        Injection prevention (prodsec-skills):
        - SQL: parameterized queries only; no string concatenation
        - Path traversal: canonicalize paths, reject ../
        - Deserialization: no unsafe deserialization of untrusted data
        - Validate at trust boundaries with allow-lists, not deny-lists

    # ── Authentication ───────────────────────────────────────────
    - path: "internal/authn/**/*"
      instructions: |
        Authentication review (prodsec-skills):
        - JWT: verify signature, issuer, audience, expiry, nbf
        - No ambient authority; require credentials per request
        - Service-to-service: mTLS or short-lived tokens, not shared secrets
        - Avoid API keys; prefer IdP-issued short-lived tokens
        - Rate limit auth attempts where applicable

    # ── Database & data layer ────────────────────────────────────
    - path: "internal/{data,storage}/**/*"
      instructions: |
        Data store security (prodsec-skills):
        - Auth: no default credentials; use IAM or IdP tokens
        - Encryption: TLS in transit
        - Least privilege: app user has minimal DB grants
        - Connection strings: no embedded credentials
        - SQL: parameterized queries only

    # ── Kafka, consumer & pubsub ─────────────────────────────────
    - path: "{internal/consumer/**/*,internal/pubsub/**/*}"
      instructions: |
        Messaging security (prodsec-skills):
        - Kafka: TLS, SASL auth, per-topic ACLs
        - No anonymous access in production
        - Consumer: validate message schemas before processing

    # ── Container & image hardening ──────────────────────────────
    - path: "**/{Dockerfile,Containerfile}*"
      instructions: |
        Container security (prodsec-skills):
        - Base image: UBI minimal or distroless from catalog.redhat.com
        - Red Hat images: use floating tags; non-RH images: pin by digest
        - Multi-stage builds; no build tools in final image
        - USER non-root; never run as root
        - COPY specific files, not entire context
        - No secrets in ENV, ARG, or COPY
        - Read-only rootfs where possible
        - No package manager cache in final layer
        - HEALTHCHECK defined

    # ── Kubernetes & OpenShift manifests ──────────────────────────
    - path: "deploy/**/*.{yaml,yml}"
      instructions: |
        Kubernetes/OpenShift security (prodsec-skills):
        - securityContext: runAsNonRoot, readOnlyRootFilesystem,
          allowPrivilegeEscalation: false
        - Drop ALL capabilities, add only what is required
        - Resource limits (cpu, memory) on every container
        - No hostPID, hostNetwork, hostIPC, privileged: true
        - Liveness + readiness probes defined
        - automountServiceAccountToken: false unless needed
        - RBAC: least privilege; no cluster-admin for workloads
        - No secrets in env vars or configmaps; use Secret resources

    # ── Tekton pipelines ─────────────────────────────────────────
    - path: ".tekton/**/*"
      instructions: |
        CI/CD security (prodsec-skills):
        - No secrets in logs; mask sensitive outputs
        - Least privilege on service accounts
        - Sign artifacts with Sigstore/cosign
        - Validate inputs from external triggers

    # ── GitHub Actions ───────────────────────────────────────────
    - path: ".github/workflows/**/*"
      instructions: |
        CI/CD security (prodsec-skills):
        - Pin actions by full SHA, not tag
        - No secrets in logs; mask sensitive outputs
        - Least privilege: minimize GITHUB_TOKEN permissions
        - No pull_request_target with checkout of PR head
        - Agentic CI actions: audit for prompt injection via
          issue/PR title/body flowing into LLM prompts

    # ── Supply chain & dependencies ──────────────────────────────
    - path: "**/{go.mod,go.sum}"
      instructions: |
        Supply chain security (prodsec-skills):
        - New deps: justify need, check license compatibility
        - Flag known CVEs (cross-ref osv.dev)
        - No pre-release or yanked versions in production

    # ── Cryptography (catch-all for crypto-related files) ────────
    - path: "**/*{crypt,cipher,sign,hash,tls,ssl,cert,key,token}*"
      instructions: |
        Cryptographic security (prodsec-skills):
        - Banned: MD5, SHA1, DES, RC4, 3DES, Blowfish, ECB mode
        - Symmetric: AES-256-GCM or ChaCha20-Poly1305
        - Constant-time comparison for all secret/token data
        - No custom crypto; use vetted libraries only

    # ── Grafana dashboards ───────────────────────────────────────
    - path: "dashboards/**/*"
      instructions: |
        Dashboard review:
        - No hardcoded credentials or tokens in dashboard JSON
        - Datasource references should use variables, not direct URLs
        - Verify PromQL queries reference valid metric names

    # ── Documentation gap detection ──────────────────────────────
    #
    # Flag PRs that introduce new features, change behavior, or
    # make non-obvious modifications without a documentation update.
    # Considers both in-repo docs and the Kessel Docs repo.
    #
    # In-repo doc locations:
    #   docs/dev-guides/    — developer how-to guides
    #   docs/runbooks/      — operational runbooks
    #   README.md           — project overview, setup, API examples
    #   CONTRIBUTING.md     — contribution workflow
    #   AGENTS.md           — AI agent guidelines and docs index
    #   internal/*/GUIDELINES.md — layer-specific coding guidelines
    #
    # Cross-repo target:
    #   github.com/project-kessel/docs — Kessel user-facing docs

    - path: "**/*.go"
      instructions: |
        Documentation gap check (skip for pure refactors, test-only
        changes, or trivial bug fixes that do not alter observable
        behavior):

        When a PR adds a new feature, changes existing behavior,
        adds/removes/renames a config key or CLI flag, or modifies
        a public API contract, check whether documentation was
        updated alongside the code:

        1. In-repo docs — does a relevant guide in docs/dev-guides/
           or the layer's GUIDELINES.md cover this area? Is it now
           stale because of this change?
        2. Cross-repo docs — for user-facing changes (new resource
           types, changed API behavior, new auth modes, new
           endpoints), the Kessel Docs repo
           (github.com/project-kessel/docs) likely needs a
           corresponding update as well. Flag if none is present.
        3. Config/flag docs — changes to configuration handling
           should be reflected in README.md and
           docs/dev-guides/docker-compose-options.md.
        4. Consumer/runbook docs — for changes under
           internal/consumer/ (new message types, changed retry
           logic, error handling, CDC integration), check whether
           the operational runbooks under docs/runbooks/ are now
           stale. Name the specific runbook and what needs updating.

        Be specific: name the doc file and section that appears
        stale or missing, describe what should be documented, and
        suggest whether the update belongs in-repo or in the
        Kessel Docs repo. Do not leave a generic "please update
        docs" comment.

    - path: "api/**/*.proto"
      instructions: |
        Documentation gap check:

        Protobuf changes (new RPCs, modified messages, added or
        removed fields, changed comments) almost always require
        documentation updates. Flag if this PR does not include
        changes to:
        - README.md API examples or endpoint descriptions
        - The Kessel Docs repo (github.com/project-kessel/docs)
          for API reference and integration guides
        - docs/dev-guides/ if the change affects developer workflow

        Kessel SDK update check:

        Proto changes also affect downstream Kessel SDKs that are
        generated from or depend on these definitions. When a PR
        modifies proto files (new RPCs, changed messages, updated
        comments), remind the author to coordinate updates to the
        Kessel SDKs (github.com/project-kessel/kessel-sdk-go,
        kessel-sdk-java, kessel-sdk-py, kessel-sdk-node,
        kessel-sdk-ruby, kessel-sdk-browser) so that consumers
        can see the changes. Name the specific proto change and
        which SDK repos are likely affected.

        Name the specific proto change (e.g. "new ListFoo RPC
        added but no docs updated") and which documentation target
        needs a corresponding update.

    - path: "development/**"
      instructions: |
        Documentation gap check:

        Docker Compose files, development configs, or setup script
        changes must be reflected in
        docs/dev-guides/docker-compose-options.md and the README.md
        local development section. New services, changed ports,
        renamed config variants, or new make targets all need
        documentation. Flag if the corresponding doc update is
        missing from this PR.

    - path: "deploy/*ephem*.yaml"
      instructions: |
        Documentation gap check (skip for pure formatting, comment-only,
        or label-only changes):

        Ephemeral deploy templates drive service-provider onboarding
        flows. When a PR changes container images, resource limits,
        environment variables, volume mounts, init containers, or
        service endpoints in these templates, check:

        1. In-repo docs — are docs/dev-guides/ephemeral-testing.md
           and docs/dev-guides/ephemeral-testing-w-notifications.md
           still accurate? Flag the specific section that is now stale
           (e.g. "the environment variables table no longer lists
           NEW_VAR added in this PR").
        2. InScope docs — Kessel internal documentation on InScope
           (private, not accessible to CodeRabbit) may also need
           updating. Flag an FYI reminder for the author to check
           the Kessel InScope onboarding/ephemeral docs for staleness.

        Be specific: name the template change, the doc file and
        section that appears stale, and what should be documented.

    - path: "Makefile"
      instructions: |
        Documentation gap check:

        New, renamed, or removed Make targets should be reflected in:
        - README.md (build and test commands)
        - docs/dev-guides/docker-compose-options.md (dev targets)
        - CLAUDE.md (build command reference for AI agents)
        Flag the specific target change and which doc is now stale.

  # ── Security scanners ────────────────────────────────────────
  tools:
    gitleaks:
      enabled: true
    semgrep:
      enabled: true
    checkov:
      enabled: true
    hadolint:
      enabled: true
    trivy:
      enabled: true
    osvScanner:
      enabled: true
    actionlint:
      enabled: true
    ast-grep:
      essential_rules: true

  # ── Pre-merge checks (hard gates) ───────────────────────────
  pre_merge_checks:
    description:
      mode: "warning"
    custom_checks:
      - name: "no-hardcoded-secrets"
        instructions: |
          Flag hardcoded secrets: API keys, tokens, passwords, private
          keys, credentials. Also flag base64 strings >32 chars in config,
          URLs with embedded credentials, variables named api_key/secret/
          token/password assigned string literals.
        mode: "error"

      - name: "no-weak-crypto"
        instructions: |
          Flag MD5, SHA1, DES, RC4, 3DES, Blowfish, ECB mode usage.
          Flag custom crypto implementations. Flag non-constant-time
          comparison of secrets or tokens.
        mode: "error"

      - name: "no-injection-vectors"
        instructions: |
          Flag SQL string concatenation, eval/exec on untrusted data,
          fmt.Sprintf used to build SQL queries, os/exec with
          unsanitized user input.
        mode: "error"

      - name: "container-privileges"
        instructions: |
          Flag privileged: true, hostPID, hostNetwork, hostIPC,
          SYS_ADMIN capability, running as root without justification,
          allowPrivilegeEscalation: true in container/K8s manifests.
        mode: "error"

      - name: "no-sensitive-data-in-logs"
        instructions: |
          Flag logging that may expose passwords, tokens, API keys,
          PII (email, SSN), session IDs, or customer data.
        mode: "error"

knowledge_base:
  learnings:
    scope: global
  code_guidelines:
    enabled: true
    filePatterns:
      - "**/AGENTS.md"
      - "**/CLAUDE.md"
      - "**/CONTRIBUTING.md"
      - "**/GUIDELINES.md"
  issues:
    scope: "auto"
  pull_requests:
    scope: "auto"
  linked_repositories:
    - repository: "project-kessel/kessel-sdk-browser"
      instructions: |
        Browser/React SDK (@project-kessel/react-kessel-access-check). Does NOT use proto codegen -- makes runtime HTTP calls to inventory-api's v1beta2 endpoints (checkself, checkselfbulk) with hand-written TypeScript types. Breaking changes to watch: HTTP endpoint path changes (/api/kessel/v1beta2/checkself, /api/kessel/v1beta2/checkselfbulk), request/response JSON shape changes for Check/CheckSelf operations, HTTP status code semantics, authentication flow changes affecting browser clients. Not covered by buf breaking checks since it has no proto dependency.
    - repository: "project-kessel/inventory-consumer"
      instructions: |
        Kafka consumer service that reads Debezium CDC messages and forwards them to inventory-api via gRPC (through kessel-sdk-go). Two dependency paths: (1) Go module dependency on inventory-api cmd/common package (ToPointer, InitLogger, GetLogLevel utilities -- used in tests only). (2) Runtime gRPC dependency via kessel-sdk-go on ReportResource, DeleteResource, GetLivez RPCs and their request/response types. Also depends on the Kafka/outbox event schema -- changes to outbox event format, Debezium message headers (operation, version), or CloudEvents payload structure would break message parsing. Proto-level breaking changes are caught by buf CI, but cmd/common and event schema changes are not.
