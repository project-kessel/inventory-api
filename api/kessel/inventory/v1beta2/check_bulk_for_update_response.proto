syntax = "proto3";

package kessel.inventory.v1beta2;

import "kessel/inventory/v1beta2/check_bulk_request.proto";
import "kessel/inventory/v1beta2/allowed.proto";
import "buf/validate/validate.proto";
import "google/rpc/status.proto";

option go_package = "github.com/project-kessel/inventory-api/api/kessel/inventory/v1beta2";
option java_multiple_files = true;
option java_package = "org.project_kessel.api.inventory.v1beta2";

// CheckBulkForUpdateResponseItem represents the result of a single check-for-update.
message CheckBulkForUpdateResponseItem {
  Allowed allowed = 1;
}

// CheckBulkForUpdateResponsePair associates a request item with its corresponding result.
message CheckBulkForUpdateResponsePair {
  CheckBulkRequestItem request = 1;
  oneof response {
    CheckBulkForUpdateResponseItem item = 2;
    google.rpc.Status error = 3;
  }
}

// CheckBulkForUpdateResponse contains the results of all check-for-update checks in the request.
message CheckBulkForUpdateResponse {
  repeated CheckBulkForUpdateResponsePair pairs = 1 [(buf.validate.field).repeated.min_items = 1];
}
