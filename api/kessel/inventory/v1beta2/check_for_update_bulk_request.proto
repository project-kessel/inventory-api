syntax = "proto3";

package kessel.inventory.v1beta2;

import "buf/validate/validate.proto";
import "kessel/inventory/v1beta2/check_bulk_request.proto";

option go_package = "github.com/project-kessel/inventory-api/api/kessel/inventory/v1beta2";
option java_multiple_files = true;
option java_package = "org.project_kessel.api.inventory.v1beta2";

// CheckForUpdateBulkRequest allows checking multiple "can subject update resource?" permissions
// in a single request. Each check is strongly consistent (same semantics as CheckForUpdate).
// This is more efficient than making individual CheckForUpdate calls when verifying update
// permissions for multiple resource-subject-relation combinations.
message CheckForUpdateBulkRequest {
  repeated CheckBulkRequestItem items = 1 [(buf.validate.field).repeated.min_items = 1,
    (buf.validate.field).repeated.max_items = 1000];
}
