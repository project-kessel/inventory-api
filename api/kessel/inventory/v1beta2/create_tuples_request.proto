syntax = "proto3";

package kessel.inventory.v1beta2;

import "kessel/inventory/v1beta2/relationship.proto";
import "kessel/inventory/v1beta2/relation_fencing_check.proto";

option go_package = "github.com/project-kessel/inventory-api/api/kessel/inventory/v1beta2";
option java_multiple_files = true;
option java_package = "org.project_kessel.api.inventory.v1beta2";

// DEPRECATED: CreateTuplesRequest is part of the legacy tuple-layer API.
// This type exists only for RBAC backward compatibility and will be removed.
message CreateTuplesRequest {
  // Whether or not the request should ignore existing tuples (true),
  // or if the request should fail if the same tuple already exists (false).
  // Defaults to false.
  bool upsert = 1;
  repeated Relationship tuples = 2;
  optional RelationFencingCheck fencing_check = 3;
}
