syntax = "proto3";

package kessel.inventory.v1beta2;

import "buf/validate/validate.proto";
import "kessel/inventory/v1beta2/relation_tuple_filter.proto";
import "kessel/inventory/v1beta2/relation_fencing_check.proto";

option go_package = "github.com/project-kessel/inventory-api/api/kessel/inventory/v1beta2";
option java_multiple_files = true;
option java_package = "org.project_kessel.api.inventory.v1beta2";

// DEPRECATED: DeleteTuplesRequest is part of the legacy tuple-layer API.
// This type exists only for RBAC backward compatibility and will be removed.
message DeleteTuplesRequest {
  RelationTupleFilter filter = 1 [(buf.validate.field).required = true];
  optional RelationFencingCheck fencing_check = 2;
}
