syntax = "proto3";

package kessel.inventory.v1beta2;

import "buf/validate/validate.proto";
import "kessel/inventory/v1beta2/relation_object_type.proto";

option go_package = "github.com/project-kessel/inventory-api/api/kessel/inventory/v1beta2";
option java_multiple_files = true;
option java_package = "org.project_kessel.api.inventory.v1beta2";

// DEPRECATED: RelationObjectReference is part of the legacy tuple-layer API.
// This type exists only for RBAC backward compatibility and will be removed.
// New code should use ResourceReference instead.
message RelationObjectReference {
  RelationObjectType type = 1 [(buf.validate.field).required = true];
  string id = 2 [(buf.validate.field).string.min_len = 1];
}
