syntax = "proto3";

package kessel.inventory.v1beta2;

import "buf/validate/validate.proto";
import "kessel/inventory/v1beta2/relation_object_reference.proto";

option go_package = "github.com/project-kessel/inventory-api/api/kessel/inventory/v1beta2";
option java_multiple_files = true;
option java_package = "org.project_kessel.api.inventory.v1beta2";

// DEPRECATED: RelationSubjectReference is part of the legacy tuple-layer API.
// This type exists only for RBAC backward compatibility and will be removed.
// New code should use SubjectReference instead.
message RelationSubjectReference {
  // An optional relation which points to a set of subjects instead of the single subject.
  // e.g. "members" or "owners" of a group identified in `subject`.
  optional string relation = 1;
  RelationObjectReference subject = 2 [(buf.validate.field).required = true];
}
