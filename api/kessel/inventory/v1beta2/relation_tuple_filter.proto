syntax = "proto3";

package kessel.inventory.v1beta2;

import "kessel/inventory/v1beta2/relation_subject_filter.proto";

option go_package = "github.com/project-kessel/inventory-api/api/kessel/inventory/v1beta2";
option java_multiple_files = true;
option java_package = "org.project_kessel.api.inventory.v1beta2";

// DEPRECATED: RelationTupleFilter is part of the legacy tuple-layer API.
// This type exists only for RBAC backward compatibility and will be removed.
//
// RelationTupleFilter is used to filter tuples based on their resource, relation, and subject.
// All fields are optional but at least one field should be provided.
message RelationTupleFilter {
  optional string resource_namespace = 1;
  optional string resource_type = 2;
  optional string resource_id = 3;
  optional string relation = 4;
  optional RelationSubjectFilter subject_filter = 5;
}
