# Compiled Schema for K8s Cluster Resource
# This is the serialized/compiled format loaded by Inventory API at runtime
# Source: Converted from data/schema/resources/k8s_cluster/{common_representation.json,reporters/*/k8s_cluster.json,config.yaml}

schema_version: "1.0"
name: k8s_cluster
description: "A Kubernetes cluster"

common:
  # JSON Schema embedded in YAML
  schema:
    type: object
    properties:
      workspace_id:
        type: string
    required:
      - workspace_id

  # Custom relations section for tuple generation
  relations:
    - name: workspace
      target: rbac/workspace
      field: workspace_id
      cardinality: one

reporters:
  - name: acm
    description: "Advanced Cluster Management reporter"
    # JSON Schema embedded in YAML
    schema:
      type: object
      properties:
        external_cluster_id:
          type: string
        cluster_status:
          type: string
          enum:
            - CLUSTER_STATUS_UNSPECIFIED
            - CLUSTER_STATUS_OTHER
            - READY
            - FAILED
            - OFFLINE
        cluster_reason:
          type: string
        kube_version:
          type: string
        kube_vendor:
          type: string
          enum:
            - KUBE_VENDOR_UNSPECIFIED
            - KUBE_VENDOR_OTHER
            - AKS
            - EKS
            - IKS
            - OPENSHIFT
            - GKE
        vendor_version:
          type: string
        cloud_platform:
          type: string
          enum:
            - CLOUD_PLATFORM_UNSPECIFIED
            - CLOUD_PLATFORM_OTHER
            - NONE_UPI
            - BAREMETAL_IPI
            - BAREMETAL_UPI
            - AWS_IPI
            - AWS_UPI
            - AZURE_IPI
            - AZURE_UPI
            - IBMCLOUD_IPI
            - IBMCLOUD_UPI
            - KUBEVIRT_IPI
            - OPENSTACK_IPI
            - OPENSTACK_UPI
            - GCP_IPI
            - GCP_UPI
            - NUTANIX_IPI
            - NUTANIX_UPI
            - VSPHERE_IPI
            - VSPHERE_UPI
            - OVIRT_IPI
        nodes:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              cpu:
                type: string
              memory:
                type: string
            required:
              - name
              - cpu
              - memory
      required:
        - external_cluster_id
        - cluster_status
        - cluster_reason
        - kube_version
        - kube_vendor
        - vendor_version
        - cloud_platform

