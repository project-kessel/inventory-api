# Compiled Schema for K8s Policy Resource
# This is the serialized/compiled format loaded by Inventory API at runtime
# Source: Converted from data/schema/resources/k8s_policy/{common_representation.json,reporters/acm/k8s_policy.json,config.yaml}

schema_version: "1.0"

resources:
  - name: k8s_policy
    description: "A Kubernetes policy definition"

    common:
      # JSON Schema embedded in YAML
      schema:
        type: object
        properties:
          workspace_id:
            type: string
        required:
          - workspace_id

      # Custom relations section for tuple generation
      relations:
        - name: workspace
          target: rbac/workspace
          field: workspace_id
          cardinality: one

    reporters:
      - name: acm
        description: "Advanced Cluster Management policy reporter"
        # JSON Schema embedded in YAML
        schema:
          type: object
          properties:
            disabled:
              type: boolean
              description: "Defines if the policy is currently enabled or disabled across all targets"
            severity:
              type: string
              description: "The severity level of the policy"
              enum:
                - SEVERITY_UNSPECIFIED
                - SEVERITY_OTHER
                - LOW
                - MEDIUM
                - HIGH
                - CRITICAL
          required:
            - disabled
            - severity
