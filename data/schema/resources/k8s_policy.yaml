schema_version: '1.0'
name: k8s_policy
description: A Kubernetes policy definition
common:
  schema:
    type: object
    properties:
      workspace_id:
        type: string
    required:
    - workspace_id
  relations:
  - name: workspace
    target: rbac/workspace
    field: workspace_id
    cardinality: one
reporters:
- name: acm
  description: Advanced Cluster Management policy reporter
  schema:
    type: object
    properties:
      disabled:
        type: boolean
        description: Defines if the policy is currently enabled or disabled across
          all targets
      severity:
        type: string
        description: The severity level of the policy
        enum:
        - SEVERITY_UNSPECIFIED
        - SEVERITY_OTHER
        - LOW
        - MEDIUM
        - HIGH
        - CRITICAL
    required:
    - disabled
    - severity
