schema_version: "1.0"
name: notifications_integration
description: A notifications service integration
common:
  schema:
    type: object
    properties:
      workspace_id:
        type: string
    required:
    - workspace_id
  relations:
  - name: workspace
    target: rbac/workspace
    field: workspace_id
    cardinality: one
reporters:
- name: notifications
  description: Notifications service reporter
  schema:
    type: object
    properties:
      reporter_type:
        type: string
        description: The type of reporter, fixed to 'NOTIFICATIONS' for this schema
        enum:
        - NOTIFICATIONS
      reporter_instance_id:
        type: string
        description: A unique identifier for the reporter instance, such as a service
          account
      local_resource_id:
        type: string
        description: A string representing the local identifier of the resource
    required:
    - reporter_type
    - reporter_instance_id
    - local_resource_id
