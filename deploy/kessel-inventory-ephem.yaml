apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: inventory
objects:
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: inventory-api-config
    data:
      inventory-api-config.yaml: |
        storage:
          max-serialization-retries: 10
          outbox-mode: wal
        authn:
          authenticator:
            type: first_match
            chain:
              - type: x-rh-identity
                transport:
                  http: true
                  grpc: false
              - type: allow-unauthenticated
        authz:
          kessel:
            insecure-client: true
            enable-oidc-auth: false
          spicedb:
            schema-file: "/etc/spicedb-schema/schema.zed"
            use-tls: false
            fully-consistent: true
        selfsubjectstrategy:
          redhatRbacSelfSubjectStrategy:
            enabled: true
            issuerDomain: redhat
            # oidcIssuerDomains is unused in ephemeral (no OIDC in the authn chain) but required by validation
            oidcIssuerDomains:
              - iss: https://not-used.example.com
                domain: redhat
        consumer:
          enabled: true
          topic: outbox.event.kessel.tuples
          retry-options:
            consumer-max-retries: -1
            operation-max-retries: -1
            backoff-factor: 5
            max-backoff-seconds: 30
          auth:
            enabled: false
        consistency:
          read-after-write-enabled: true # false == off for all service providers
          read-after-write-allowlist: ["*"] # specify ["*"] to allow any request to optionally r-a-w
        schema:
          repository: in-memory
          in-memory:
            type: dir
            path: /data/schema/resources
        log:
          level: "info"
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: resources-tarball
    binaryData:
      resources.tar.gz: 
  - apiVersion: v1
    kind: Secret
    metadata:
      name: kessel-spicedb-config
    stringData:
      preshared_key: "averysecretpresharedkey"
      datastore_uri: postgres://authz:SuperSecretPassword@kessel-spicedb-postgres:5432/authz?sslmode=disable
  - apiVersion: v1
    kind: Secret
    metadata:
      name: kessel-spicedb-postgres-secret
    stringData:
      POSTGRESQL_DATABASE: authz
      POSTGRESQL_USER: authz
      POSTGRESQL_PASSWORD: SuperSecretPassword
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      labels:
        app: kessel-spicedb-postgres
      name: kessel-spicedb-postgres
    spec:
      strategy:
        type: Recreate
      selector:
        matchLabels:
          app: kessel-spicedb-postgres
      template:
        metadata:
          labels:
            app: kessel-spicedb-postgres
        spec:
          containers:
          - env:
              - name: POSTGRESQL_DATABASE
                valueFrom:
                  secretKeyRef:
                    name: kessel-spicedb-postgres-secret
                    key: POSTGRESQL_DATABASE
              - name: POSTGRESQL_USER
                valueFrom:
                  secretKeyRef:
                    name: kessel-spicedb-postgres-secret
                    key: POSTGRESQL_USER
              - name: POSTGRESQL_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: kessel-spicedb-postgres-secret
                    key: POSTGRESQL_PASSWORD
              - name: PGDATA
                value: /var/lib/pgsql/data
            image: registry.redhat.io/rhel9/postgresql-16:9.5-1744136555
            imagePullPolicy: Always
            name: postgres
            ports:
              - containerPort: 5432
                protocol: TCP
            resources:
              limits:
                cpu: ${SPICEDB_POSTGRES_CPU_LIMIT}
                memory: ${SPICEDB_POSTGRES_MEMORY_LIMIT}
              requests:
                cpu: ${SPICEDB_POSTGRES_CPU_REQUEST}
                memory: ${SPICEDB_POSTGRES_MEMORY_REQUEST}
            volumeMounts:
              - name: kessel-spicedb-postgres-data
                mountPath: /var/lib/pgsql/data
          volumes:
          - name: kessel-spicedb-postgres-data
            persistentVolumeClaim:
              claimName: kessel-spicedb-postgres-data
          restartPolicy: Always
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: kessel-spicedb-postgres-data
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 1Gi
  - apiVersion: v1
    kind: Service
    metadata:
      labels:
        app: kessel-spicedb-postgres
      name: kessel-spicedb-postgres
    spec:
      ports:
      - name: http
        port: 5432
        protocol: TCP
      selector:
        app: kessel-spicedb-postgres
  - apiVersion: authzed.com/v1alpha1
    kind: SpiceDBCluster
    metadata:
      name: kessel-spicedb
    spec:
      config:
        logLevel: debug
        replicas: ${{SPICEDB_REPLICAS}}
        datastoreEngine: postgres
        image: ${{SPICEDB_IMAGE}}
      secretName: kessel-spicedb-config
      patches:
      - kind: Deployment
        patch:
          spec:
            template:
              spec:
                containers:
                  - name: spicedb
                    resources:
                      requests:
                        memory: ${SPICEDB_MEMORY_REQUEST}
                        cpu: ${SPICEDB_CPU_REQUEST}
                      limits:
                        memory: ${SPICEDB_MEMORY_LIMIT}
                        cpu: ${SPICEDB_CPU_LIMIT}
                    env:
                      - name: SPICEDB_DISPATCH_CLUSTER_ENABLED
                        value: "false"
                      - name: SPICEDB_DISPATCH_UPSTREAM_ADDR
                        value: ""
  - apiVersion: cloud.redhat.com/v1alpha1
    kind: ClowdApp
    metadata:
      name: kessel-inventory
    spec:
      envName: ${ENV_NAME}
      database:
        name: kessel-inventory
        version: 16
      kafkaTopics:
        - topicName: outbox.event.kessel.tuples
          partitions: 1
          replicas: 3
        - topicName: outbox.event.kessel.resources
          partitions: 1
          replicas: 3
      dependencies:
        - kessel-relations
      optionalDependencies:
        - kessel-kafkaconnect
      deployments:
        - name: api
          replicas: ${{REPLICAS}}
          podSpec:
            initContainers:
              - name: fetch-spicedb-schema
                image: ${SCHEMA_INIT_IMAGE}
                command:
                  - sh
                  - -c
                  - |
                    curl -sSfL -o /etc/spicedb-schema/schema.zed \
                      "https://raw.githubusercontent.com/${SPICEDB_SCHEMA_REPO}/${SPICEDB_SCHEMA_REF}/${SPICEDB_SCHEMA_PATH}"
                inheritEnv: false
                volumeMounts:
                  - name: spicedb-schema
                    mountPath: /etc/spicedb-schema
              - name: copy-resources
                image: registry.access.redhat.com/ubi9
                imagePullPolicy: Always
                command:
                  - /bin/sh
                  - "-c"
                  - |
                    echo "Extracting resources from tarball..."
                    tar -xzf /mnt/resources/resources.tar.gz -C /data/schema/resources
                    echo "Extraction complete!"
                volumeMounts:
                  - name: resources-tarball
                    mountPath: "/mnt/resources"
                  - name: resource-volume
                    mountPath: "/data/schema/resources"
              - name: migration
                image: ${INVENTORY_IMAGE}:${IMAGE_TAG}
                imagePullPolicy: Always
                command: ["inventory-api"]
                args: ["migrate"]
                inheritEnv: true
            image: ${INVENTORY_IMAGE}:${IMAGE_TAG}
            imagePullPolicy: Always
            command: ["inventory-api"]
            args: ["serve"]
            livenessProbe:
              httpGet:
                path: /api/kessel/v1/livez
                port: 8000
            readinessProbe:
              httpGet:
                path: /api/kessel/v1/readyz
                port: 8000
            env:
              - name: CLOWDER_ENABLED
                value: "true"
              - name: INVENTORY_API_CONFIG
                value: "/inventory/inventory-api-config.yaml"
              - name: PGDATA
                value: /temp/data
              - name: INVENTORY_API_AUTHZ_IMPL
                value: ${AUTHZ_IMPL}
              - name: INVENTORY_API_AUTHZ_SPICEDB_ENDPOINT
                value: "kessel-spicedb:50051"
              - name: INVENTORY_API_AUTHZ_SPICEDB_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: kessel-spicedb-config
                    key: preshared_key
            volumeMounts:
              - name: config-volume
                mountPath: "/inventory"
              - name: resource-volume
                mountPath: "/data/schema/resources"
              - name: resources-tarball
                mountPath: "/mnt/resources"
              - name: spicedb-schema
                mountPath: /etc/spicedb-schema
            volumes:
              - name: config-volume
                configMap:
                  name: inventory-api-config
              - name: resource-volume
                emptyDir: {}
              - name: resources-tarball
                configMap:
                  name: resources-tarball
              - name: spicedb-schema
                emptyDir: {}
          webServices:
            public:
              enabled: true
              h2cEnabled: true
              h2cTargetPort: 9000
              apiPath: kessel
      testing:
        iqePlugin: kessel-inventory
  - apiVersion: batch/v1
    kind: CronJob
    metadata:
      name: business-metrics-collect
      labels:
        app: kessel-inventory-jobs
        job-type: metrics-collect
    spec:
      suspend: ${{METRICS_CRONJOB_SUSPEND}}
      schedule: "@hourly"
      concurrencyPolicy: Forbid
      successfulJobsHistoryLimit: 3
      failedJobsHistoryLimit: 3
      jobTemplate:
        metadata:
          labels:
            app: kessel-inventory-jobs
            job-type: metrics-collect
        spec:
          backoffLimit: 3
          template:
            metadata:
              labels:
                app: kessel-inventory-jobs
                job-type: metrics-collect
            spec:
              restartPolicy: OnFailure
              containers:
                - name: metrics-collect
                  image: ${INVENTORY_IMAGE}:${IMAGE_TAG}
                  imagePullPolicy: Always
                  command:
                    - inventory-api
                    - run-job
                    - metrics-collect-job
                    - --retention-days=30
                  env:
                    - name: CLOWDER_ENABLED
                      value: "true"
                    - name: INVENTORY_API_CONFIG
                      value: "/inventory/inventory-api-config.yaml"
                    - name: PGDATA
                      value: /temp/data
                    - name: INVENTORY_API_STORAGE_POSTGRES_HOST
                      valueFrom:
                        secretKeyRef:
                          name: kessel-inventory-db
                          key: db.host
                          optional: true
                    - name: INVENTORY_API_STORAGE_POSTGRES_PORT
                      valueFrom:
                        secretKeyRef:
                          name: kessel-inventory-db
                          key: db.port
                          optional: true
                    - name: INVENTORY_API_STORAGE_POSTGRES_DBNAME
                      valueFrom:
                        secretKeyRef:
                          name: kessel-inventory-db
                          key: db.name
                          optional: true
                    - name: INVENTORY_API_STORAGE_POSTGRES_USER
                      valueFrom:
                        secretKeyRef:
                          name: kessel-inventory-db
                          key: db.user
                          optional: true
                    - name: INVENTORY_API_STORAGE_POSTGRES_PASSWORD
                      valueFrom:
                        secretKeyRef:
                          name: kessel-inventory-db
                          key: db.password
                          optional: true
                    - name: INVENTORY_API_STORAGE_DATABASE
                      value: postgres
                  volumeMounts:
                    - name: config-volume
                      mountPath: "/inventory"
                  resources:
                    requests:
                      memory: ${JOB_REQUESTS_MEMORY}
                      cpu: ${JOB_REQUESTS_CPU}
                    limits:
                      memory: ${JOB_LIMITS_MEMORY}
                      cpu: ${JOB_LIMITS_CPU}
              volumes:
                - name: config-volume
                  configMap:
                    name: ${INVENTORY_API_CONFIG_NAME}
parameters:
  - description: ClowdEnvironment name (ephemeral, stage, prod)
    name: ENV_NAME
    required: true
  - description: App Image
    name: INVENTORY_IMAGE
    value: quay.io/redhat-services-prod/project-kessel-tenant/kessel-inventory/inventory-api
  - description: Image Tag
    name: IMAGE_TAG
    required: true
    value: latest
  - description: Number of replicas
    name: REPLICAS
    value: "1"
  - name: TOPIC_HEARTBEAT_PREFIX
    value: debezium-heartbeat
    description: Prefix for the connector heartbeat topic
  - name: DEBEZIUM_ACTION_QUERY
    value: "SELECT pg_logical_emit_message(false, 'heartbeat', now()::varchar);"
    description: Query action that runs for each heartbeat event
  - name: DEBEZIUM_HEARTBEAT_INTERVAL_MS
    value: "300000"
    description: The interval for the Debezium heartbeat in ms
  - name: DEBEZIUM_POLL_INTERVAL_MS
    value: "250"
    description: The interval for the Debezium batch processing
  - description: Name of the Inventory API Config K8s ConfigMap
    name: INVENTORY_API_CONFIG_NAME
    value: inventory-api-config
  - description: Memory request for job
    name: JOB_REQUESTS_MEMORY
    value: '256Mi'
  - description: CPU request for job
    name: JOB_REQUESTS_CPU
    value: '100m'
  - description: Memory limit for job
    name: JOB_LIMITS_MEMORY
    value: '384Mi'
  - description: CPU limit for job
    name: JOB_LIMITS_CPU
    value: '200m'
  - description: Suspend the metrics collection CronJob (set to true to disable)
    name: METRICS_CRONJOB_SUSPEND
    value: "true"
  - name: AUTHZ_IMPL
    description: Authz implementation (allow-all, kessel, spicedb)
    value: "kessel"
  - name: SPICEDB_IMAGE
    description: SpiceDB container image
    value: quay.io/redhat-services-prod/project-kessel-tenant/kessel-relations/spicedb:latest
  - name: SPICEDB_REPLICAS
    description: Number of SpiceDB pods
    value: "1"
  - name: SPICEDB_CPU_REQUEST
    description: SpiceDB CPU Request
    value: 200m
  - name: SPICEDB_CPU_LIMIT
    description: SpiceDB CPU Limit
    value: 500m
  - name: SPICEDB_MEMORY_REQUEST
    description: SpiceDB Memory Request
    value: 128Mi
  - name: SPICEDB_MEMORY_LIMIT
    description: SpiceDB Memory Limit
    value: 128Mi
  - name: SPICEDB_POSTGRES_CPU_REQUEST
    description: SpiceDB Postgres CPU Request
    value: 200m
  - name: SPICEDB_POSTGRES_CPU_LIMIT
    description: SpiceDB Postgres CPU Limit
    value: 500m
  - name: SPICEDB_POSTGRES_MEMORY_REQUEST
    description: SpiceDB Postgres Memory Request
    value: 128Mi
  - name: SPICEDB_POSTGRES_MEMORY_LIMIT
    description: SpiceDB Postgres Memory Limit
    value: 128Mi
  - name: SCHEMA_INIT_IMAGE
    description: Image for the schema init container
    value: registry.access.redhat.com/ubi9/ubi-minimal:latest
  - name: SPICEDB_SCHEMA_REPO
    description: GitHub org/repo for SpiceDB schema
    value: project-kessel/rbac-config
  - name: SPICEDB_SCHEMA_REF
    description: Git ref for SpiceDB schema
    value: master
  - name: SPICEDB_SCHEMA_PATH
    description: Path to schema.zed within the repo
    value: configs/stage/schemas/schema.zed
