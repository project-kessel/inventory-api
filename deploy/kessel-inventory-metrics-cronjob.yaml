apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: kessel-inventory-metrics-cronjob
objects:
  - apiVersion: batch/v1
    kind: CronJob
    metadata:
      name: kessel-inventory-metrics-collect
      labels:
        app: kessel-inventory-jobs
        job-type: metrics-collect
    spec:
      schedule: "@daily"
      concurrencyPolicy: Forbid
      successfulJobsHistoryLimit: 3
      failedJobsHistoryLimit: 3
      jobTemplate:
        metadata:
          labels:
            app: kessel-inventory-jobs
            job-type: metrics-collect
        spec:
          backoffLimit: 3
          template:
            metadata:
              labels:
                app: kessel-inventory-jobs
                job-type: metrics-collect
            spec:
              restartPolicy: OnFailure
              containers:
                - name: metrics-collect
                  image: ${INVENTORY_IMAGE}:${IMAGE_TAG}
                  imagePullPolicy: Always
                  command:
                    - inventory-api
                    - run-job
                    - metrics-collect-job
                    - --retention-days=${RETENTION_DAYS}
                  env:
                    - name: CLOWDER_ENABLED
                      value: ${CLOWDER_ENABLED}
                    - name: INVENTORY_API_CONFIG
                      value: "/inventory/inventory-api-config.yaml"
                    - name: PGDATA
                      value: /temp/data
                    - name: INVENTORY_API_STORAGE_POSTGRES_HOST
                      valueFrom:
                        secretKeyRef:
                          name: kessel-inventory-db
                          key: db.host
                          optional: true
                    - name: INVENTORY_API_STORAGE_POSTGRES_PORT
                      valueFrom:
                        secretKeyRef:
                          name: kessel-inventory-db
                          key: db.port
                          optional: true
                    - name: INVENTORY_API_STORAGE_POSTGRES_DBNAME
                      valueFrom:
                        secretKeyRef:
                          name: kessel-inventory-db
                          key: db.name
                          optional: true
                    - name: INVENTORY_API_STORAGE_POSTGRES_USER
                      valueFrom:
                        secretKeyRef:
                          name: kessel-inventory-db
                          key: db.user
                          optional: true
                    - name: INVENTORY_API_STORAGE_POSTGRES_PASSWORD
                      valueFrom:
                        secretKeyRef:
                          name: kessel-inventory-db
                          key: db.password
                          optional: true
                    - name: INVENTORY_API_STORAGE_DATABASE
                      value: postgres
                  volumeMounts:
                    - name: config-volume
                      mountPath: "/inventory"
                  resources:
                    requests:
                      memory: ${REQUESTS_MEMORY}
                      cpu: ${REQUESTS_CPU}
                    limits:
                      memory: ${LIMITS_MEMORY}
                      cpu: ${LIMITS_CPU}
              volumes:
                - name: config-volume
                  secret:
                    secretName: ${INVENTORY_API_CONFIG_NAME}
parameters:
  - description: App Image
    name: INVENTORY_IMAGE
    value: quay.io/redhat-services-prod/project-kessel-tenant/kessel-inventory/inventory-api
  - description: Image Tag
    name: IMAGE_TAG
    required: true
  - description: Number of days to retain metrics summary data
    name: RETENTION_DAYS
    value: "30"
  - description: Enable Clowder integration (true/false)
    name: CLOWDER_ENABLED
    value: "true"
  - description: Name of the Inventory API Config ConfigMap
    name: INVENTORY_API_CONFIG_NAME
    value: inventory-api-config
  - description: Memory request for job
    name: REQUESTS_MEMORY
    value: '256Mi'
  - description: CPU request for job
    name: REQUESTS_CPU
    value: '100m'
  - description: Memory limit for job
    name: LIMITS_MEMORY
    value: '384Mi'
  - description: CPU limit for job
    name: LIMITS_CPU
    value: '200m'
