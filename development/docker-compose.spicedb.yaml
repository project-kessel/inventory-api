services:
  inventory-api:
    volumes:
      - ./configs/schema.zed:/schema.zed:ro,z

  ### ---------- SpiceDB Stack ----------

  spicedb-database:
    image: "postgres"
    command: -c track_commit_timestamp=on
    hostname: spicedb-database
    ports:
      - "5432:5432"
    environment:
      - "POSTGRES_PASSWORD=yPsw5e6ab4bvAGe5H"
      - "POSTGRES_DB=spicedb"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -p 5432"]
      interval: 5s
      timeout: 3s
      retries: 15
    networks:
      - kessel

  spicedb-migrate:
    image: "authzed/spicedb"
    command: "migrate head"
    restart: "on-failure"
    environment:
      - "SPICEDB_DATASTORE_ENGINE=postgres"
      - "SPICEDB_DATASTORE_CONN_URI=postgres://postgres:yPsw5e6ab4bvAGe5H@spicedb-database:5432/spicedb?sslmode=disable"
    depends_on:
      spicedb-database:
        condition: service_healthy
    networks:
      - kessel

  spicedb:
    image: "authzed/spicedb"
    command: "serve"
    restart: "always"
    ports:
      - "50051:50051"
    environment:
      - "SPICEDB_GRPC_PRESHARED_KEY=foobar"
      - "SPICEDB_DATASTORE_ENGINE=postgres"
      - "SPICEDB_DATASTORE_CONN_URI=postgres://postgres:yPsw5e6ab4bvAGe5H@spicedb-database:5432/spicedb?sslmode=disable"
    depends_on:
      spicedb-migrate:
        condition: service_completed_successfully
    networks:
      - kessel
