services:

  ### ---------- Inventory API Stack ----------

  inventory-api:
    depends_on:
      invmigrate:
        condition: service_completed_successfully
    environment:
      INVENTORY_API_CONFIG: /inventory-api-compose.yaml
      INVENTORY_API_SERVER_HTTP_ADDRESS: "0.0.0.0:${HTTP_PORT}"
      INVENTORY_API_SERVER_GRPC_ADDRESS: "0.0.0.0:${GRPC_PORT}"
      INVENTORY_API_AUTHZ_IMPL: "${AUTHZ_IMPL:-}"
      INVENTORY_API_LOG_LEVEL: "${LOG_LEVEL:-}"
    build:
      context: ../
      dockerfile: Dockerfile
      args:
        VERSION: dev
    volumes:
      - ./configs/${CONFIG}.yaml:/inventory-api-compose.yaml:ro,z
      - ../schema_cache.json:/schema_cache.json:ro,z
    command: ["serve"]
    restart: "always"
    ports:
      - "${HTTP_PORT}:${HTTP_PORT}"
      - "${GRPC_PORT}:${GRPC_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${HTTP_PORT}/api/kessel/v1/livez || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
    networks:
      - kessel

  invmigrate:
    environment:
      INVENTORY_API_CONFIG: /inventory-api-compose.yaml
    build:
      context: ../
      dockerfile: Dockerfile
      args:
        VERSION: dev
    volumes:
      - ./configs/${CONFIG}.yaml:/inventory-api-compose.yaml:ro,z
    command: ["migrate"]
    restart: "on-failure"
    depends_on:
      invdatabase:
        condition: service_healthy
    networks:
      - kessel

  invdatabase:
    image: "postgres"
    command: ["docker-entrypoint.sh", "-p", "5433", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    hostname: invdatabase
    expose:
      - "5433"
    ports:
      - "5433:5433"
    volumes:
      - ./configs/postgresql.conf:/etc/postgresql/postgresql.conf:ro,z
    environment:
      - "POSTGRES_PASSWORD=yPsw5e6ab4bvAGe5H"
      - "POSTGRES_DB=spicedb"
      - "PGPORT=5433"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -p 5433"]
      interval: 5s
      timeout: 3s
      retries: 15
    networks:
      - kessel

  ### ---------- Kafka Stack ----------

  zookeeper:
    image: quay.io/strimzi/kafka:latest-kafka-3.8.0
    command: [
      "sh", "-c",
      "bin/zookeeper-server-start.sh config/zookeeper.properties"
    ]
    ports:
      - "2181:2181"
    environment:
      LOG_DIR: /tmp/logs
    networks:
      - kessel

  kafka:
    image: quay.io/strimzi/kafka:latest-kafka-3.8.0
    command: [
      "sh", "-c",
      "bin/kafka-server-start.sh config/server.properties \
        --override listeners=$${KAFKA_LISTENERS} \
        --override advertised.listeners=$${KAFKA_ADVERTISED_LISTENERS} \
        --override zookeeper.connect=$${KAFKA_ZOOKEEPER_CONNECT} \
        --override listener.security.protocol.map=$${KAFKA_LISTENER_SECURITY_PROTOCOL_MAP} \
        --override inter.broker.listener.name=$${KAFKA_INTER_BROKER_LISTENER_NAME}"
    ]
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      LOG_DIR: "/tmp/logs"
      KAFKA_LISTENERS: "HOST://0.0.0.0:9092,DOCKER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "HOST://localhost:9092,DOCKER://kafka:9093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "DOCKER:PLAINTEXT,HOST:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: DOCKER
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
    healthcheck:
      test: ["CMD-SHELL", "bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9093"]
      interval: 10s
      timeout: 5s
      retries: 15
    networks:
      - kessel

  kafka-setup:
    image: quay.io/strimzi/kafka:latest-kafka-3.8.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: [ '/bin/sh', '-c' ]
    command: |
      "
      bin/kafka-topics.sh --bootstrap-server kafka:9093 --list

      echo -e 'Creating kafka topics'
      bin/kafka-topics.sh --bootstrap-server kafka:9093 --create --if-not-exists --topic outbox.event.kessel.resources --replication-factor 1 --partitions 1
      bin/kafka-topics.sh --bootstrap-server kafka:9093 --create --if-not-exists --topic outbox.event.kessel.tuples --replication-factor 1 --partitions 1

      echo -e 'Successfully created the following topics:'
      bin/kafka-topics.sh --bootstrap-server kafka:9093 --list
      "
    networks:
      - kessel

  ### ---------- Debezium Kafka Connect ----------

  connect:
    ports:
      - 8083:8083
    environment:
      - GROUP_ID=1
      - CONFIG_STORAGE_TOPIC=my_connect_configs
      - OFFSET_STORAGE_TOPIC=my_connect_offsets
      - STATUS_STORAGE_TOPIC=my_connect_statuses
      - BOOTSTRAP_SERVERS=kafka:9093
    depends_on:
      kafka:
        condition: service_healthy
      invdatabase:
        condition: service_healthy
    image: quay.io/debezium/connect:3.1
    restart: "always"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
    networks:
      - kessel

  connect-setup:
    image: quay.io/curl/curl:latest
    depends_on:
      connect:
        condition: service_healthy
    command: [
      "/bin/sh", "-c",
      "curl -d @/debezium-connector.json -H 'Content-Type: application/json' -X POST http://connect:8083/connectors"
    ]
    volumes:
      - ./configs/debezium-connector.json:/debezium-connector.json:ro,z
    restart: on-failure:10
    networks:
      - kessel

  ### ---------- SSO (Keycloak) ----------

  keycloak:
    image: "quay.io/keycloak/keycloak:latest"
    command: "start-dev --http-port=8084 --db-url-port 5434 --import-realm"
    restart: "on-failure"
    environment:
      - "KEYCLOAK_ADMIN=admin"
      - "KEYCLOAK_ADMIN_PASSWORD=admin"
    volumes:
      - ./configs/myrealm.json:/opt/keycloak/data/import/myrealm.json:rw,z
    ports:
      - 8084:8084
    networks:
      - kessel

  ### ---------- Monitoring Stack ----------

  prometheus:
    image: prom/prometheus
    volumes:
      - "./configs/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml"
    networks:
      - kessel
    ports:
      - 9050:9090

  prometheus-ephem:
    image: prom/prometheus
    volumes:
      - "./configs/monitoring/ephemeral-prometheus.yml:/etc/prometheus/prometheus.yml"
    networks:
      - kessel
    ports:
      - 9050:9090

  alertmanager:
    image: prom/alertmanager
    # volumes:
    #   - "./configs/monitoring/alertmanager.yml:/alertmanager/alertmanager.yml"
    networks:
      - kessel
    ports:
      - 9093:9093

  grafana:
    image: grafana/grafana-enterprise
    container_name: grafana
    restart: unless-stopped
    ports:
      - '3000:3000'
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./configs/monitoring/datasources:/etc/grafana/provisioning/datasources/
      - ./configs/monitoring/dashboards:/etc/grafana/provisioning/dashboards/
    networks:
      - kessel
volumes:
  grafana-storage: {}

networks:
  kessel:
    name: kessel
    external: true
